const levelCount = 60;

// ======================================
// CREATE ITEM
// ======================================
function nextIndex(i){

    return (
        i + 1
    ) % numbers.length;
}

function prevIndex(i){

    return (
        i - 1 +
        numbers.length
    ) % numbers.length;
}
function createTopItem(){

    let newIndex;

    if(
        sphereItems.length === 0
    ){
        newIndex = 0;
    }
    else{

        newIndex =
            nextIndex(
                sphereItems[0].index
            );
    }

    sphereItems.unshift({

        index:
            newIndex,

        value:
            String(
                numbers[newIndex]
            ),

        color:
            colors[colorIndex],

        level : 0

    });

    colorIndex =
        (colorIndex + 1)
        %
        colors.length;
}

// ======================================
// MOVEMENT
// ======================================


function moveForward(step){

    sphereItems.forEach(item=>{
        item.level += step;
    });

    sphereItems =
        sphereItems.filter(
            item => item.level < levelCount
        );

    if(
        sphereItems.length === 0 ||
        sphereItems[0].level >= 1
    ){
        createTopItem();
    }
}


function moveBackward(step){

    sphereItems.forEach(item=>{
        item.level -= step;
    });

    sphereItems =
        sphereItems.filter(
            item => item.level >= 0
        );

    if(
        sphereItems.length === 0 ||
        sphereItems[sphereItems.length-1].level <= levelCount-2
    ){

      
colorIndex =
    (
        colorIndex - 1 +
        colors.length
    )
    %
    colors.length;


const newIndex =

    sphereItems.length === 0
    ? 0
    : prevIndex(
        sphereItems[
            sphereItems.length - 1
        ].index
    );

sphereItems.push({

    index:
        newIndex,

    value:
        String(
            numbers[newIndex]
        ),

    color:
        colors[colorIndex],

    level:
        levelCount - 1

});

    }
}

// ======================================
// SINUSOID
// ======================================

function loop(timestamp){

 
const cycleDuration = 279.272727;  //124.121212

    phase +=
      (1.939393*Math.PI)
             /
        (cycleDuration * 60);

    const wave =
        Math.sin(
            phase
        );

    const direction =
        wave >= 0
        ? 1
        : -1;
if(
    direction > 0 &&
    previousDirection < 0
){

   const bottomItem =
    sphereItems[
        sphereItems.length - 1
    ];



    const visibleIndex =
        numbers.indexOf(
            bottomItem.value
        );

    if(visibleIndex >= 0){

        
    }
}

previousDirection = direction;

 const speed =
        Math.abs(
            wave
        );
           


const minInterval = 90.90909; //60.606060
const maxInterval = 323.232323; // 1939.393939



const equivalentInterval =
    maxInterval -
    speed *
    (
        maxInterval -
        minInterval
    );

const step =
    30 / equivalentInterval;


if(direction > 0){
    moveForward(step);
}
else{
    moveBackward(step);
}

drawSphere();

requestAnimationFrame(
    loop
);
}

// ======================================
// FULLSCREEN
// ======================================

function enterFullscreen(){

    if(
      !document.fullscreenElement
    ){

        document
        .documentElement
        .requestFullscreen()
        .catch(()=>{});
    }
}

document.addEventListener(
    "click",
    enterFullscreen,
    {once:true}
);

document.addEventListener(
    "touchstart",
    enterFullscreen,
    {once:true}
);

// ======================================
// START
// ======================================

window.addEventListener(
    "load",
    ()=>{
keepScreenAwake();
      



createTopItem();
drawSphere();
const openedAt = new Date();
    document.getElementById("openTime").textContent =
        openedAt.toLocaleString();
        requestAnimationFrame(
            loop
        );
    }
);
      
let wakeLock = null;

async function keepScreenAwake() {
    try {
        wakeLock = await navigator.wakeLock.request("screen");

        wakeLock.addEventListener("release", () => {
            console.log("Wake Lock released");
        });

        console.log("Screen Wake Lock active");

    } catch (err) {
        console.log("Wake Lock error:", err);
    }
}

document.addEventListener("visibilitychange", async () => {

    if (
        wakeLock !== null &&
        document.visibilityState === "visible"
    ) {
        await keepScreenAwake();
    }

});
